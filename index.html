<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>ספרית היצירות</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<div class="container">

    <!-- אזור הנגן -->

    <section class="video-panel">

        <h2 id="libraryTitle">
            ספרית היצירות
        </h2>

        <!-- מוצג רק בנייד -->

        <button id="backToMenuBtn"
                class="mobile-only"
                onclick="showMobileMenu()">
            חזרה לבחירת קטעים
        </button>

        <div class="video-wrapper"
             id="videoWrapper">

            <div id="player"></div>
            <div id="countdownOverlay" class="countdown-overlay" aria-hidden="true"></div>

        </div>
        <div class="player-toolbar">

            <div id="currentTitle">
                בחר קול ולאחר מכן בחר קטע
            </div>

            <div id="jumpToTimeContainer" class="jump-to-time">
                <button id="jumpToTimeBtn">
                    נגן מ:
                </button>

                <input
                    type="text"
                    id="jumpToTimeInput"
                    value="0.0"
                    placeholder="1:05"
                    title="זמן התחלה: דקה:שניה או שעה:דקה:שניה">

                <label class="end-time-label" for="segmentEndTimeInput">
                    עד:
                </label>

                <input
                    type="text"
                    id="segmentEndTimeInput"
                    value="0.0"
                    placeholder=""
                    title="זמן סיום הקטע">
            </div>

            <div id="skipButtons"
                 class="skip-buttons"
                 aria-label="כפתורי דילוג בנגן">
            </div>

        </div>


    </section>

    <!-- אזור הכפתורים -->

    <section class="buttons-panel">

        <div class="groups-title-row">
          <h3>קולות</h3>

          <div class="playback-options" aria-label="אפשרויות נגינה">
            <label>
              <input type="checkbox" id="playAllCheckbox">
              נגן הכל ברצף
            </label>

            <label>
              <input type="checkbox" id="repeatSegmentCheckbox">
              חזור על הקטע
            </label>
          </div>

          <button id="openFullBtn" type="button">
            פתח במסך מלא
          </button>
        </div>

        <div id="groupButtons"
             class="group-buttons">
        </div>

        <div id="groupButtons2"
             class="group-buttons second-row">
        </div>

        <h3 id="segmentsTitle">בחר קול</h3>

        <div id="segmentButtons">
        </div>

    </section>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script src="app.js"></script>

</body>

</html>
